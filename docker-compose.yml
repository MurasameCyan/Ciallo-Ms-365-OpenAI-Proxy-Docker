services:
  ciallo-proxy:
    image: ghcr.io/murasamecyan/ciallo-ms-365-openai-proxy-docker:latest
    container_name: ciallo-ms365-proxy
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - chrome-profile:/chrome-profile
    tmpfs:
      - /home/app/token:mode=0700,uid=1000,gid=1000,size=1M
    restart: unless-stopped
    shm_size: "1gb"
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
        reservations:
          memory: 512M
          cpus: "0.5"

volumes:
  chrome-profile:
